<div class="timer">
    <p class="timer__title">TIME IS <span class="timer__title-accent">RUNNING</span> OUT!</p>
    <p class="timer__subtitle">Don’t miss out <span class="timer__dash">-</span> spots are limited and disappearing fast!</p>
    <p class="timer__note">* Join now and get instant access to the full course, exclusive bonus materials, and lifetime updates.</p>
    <div class="timer__countdown">
        <div class="timer__unit">
            <span class="timer__value timer__value--days">00</span>
            <span class="timer__label">Days</span>
        </div>
        <div class="timer__unit">
            <span class="timer__value timer__value--hours">00</span>
            <span class="timer__label">Hours</span>
        </div>
        <div class="timer__unit">
            <span class="timer__value timer__value--minutes">00</span>
            <span class="timer__label">Minutes</span>
        </div>
        <div class="timer__unit">
            <span class="timer__value timer__value--seconds">00</span>
            <span class="timer__label">Seconds</span>
        </div>
    </div>
    <button class="timer__cta">Get Instant Access</button>
</div>
